# Simulation parameters
VERSION: 2.0
NUM_RUNS: 5
NUM_FRAMES: 50  # the actual number of steps = NUM_FRAMES * UPDATE_ANIMATION_INTERVAL
# key is frame number and value is num steps per frame from this frame onward
NUM_STEPS_FROM_FRAME_DICT: { 0: 2000,
                             10: 500
}
UPDATE_KDTREE_INTERVAL: 120  # 120 update the kdtree every n steps
STATUS_EVERY_STEP: False  # choose if to update every step or every frame

# Debug parameters
REBALANCE: True
DEBUG_MODE: False  # breakpoint in update_func after each frame (not step!)

# Physical model parameters
physical_model_type: physicalmodel2  # physical model type

physical_model_parameters:
  # gravity force
  g: 10  # [m/sec^2]

  # drag force (air resistence)
  gamma: 0.002  # [F]/[v] = [kg/sec] linear drag air resistence (dominant in low speeds)
  c_drag: 0.001  # [F]/[v^2] quadratic drag air resistence (dominant in high speeds)

  # friction force
  mu_static: 1.5  # [no units]  # higher mu_static means faster movement
  mu_kinetic: 0.5  # [no units]
  alpha_mu: 1  # [no units]

  # convert physical parameters to energy
  energy_conversion_factors: { 'activity_efficiency': 0.75,  #0.25,  # propulsion force to energy factor (higher -> efficient)
                               'heat_loss': 0.01,  # propulsion force to wasted energy (higher -> more loss)
                               'rest': 0.001,  # constant for Basal Metabolic Rate (BMR) energy
                               'digest': 0.05,  # [E]/[no units] convert digest factor to digest energy
                               'brain_consumption': 0.005,  # [E]/[no units] convert brain size to brain consumption energy
                               'height_energy': 1,  # [E]/[h]  # convert height to height energy
                               'mass_energy': 25  # [E]/[m] = [v^2] = [m^2/sec^4]  convert mass to energy
  }

  # trait change formulas based on given energy
  trait_energy_params_dict: { 'height_energy': { 'factor': 0.01, 'rate': 0.0005 },  # [factor] = [1], [rate] = [1/sec]
                              'mass_energy': { 'factor': 0.01, 'rate': 0.0002 }  # [factor] = [1], [rate] = [1/sec]
  }

# Environment parameters
ENV_PATH: b_basic\environments\env_images\Env8.png
BOUNDARY_CONDITION: 'zero'  # what to do with the velocity on the boundaries - 'mirror' or 'zero'
MAX_GRASS_NUM: 100
GRASS_GENERATION_RATE: 5  # if exceeding MAX_GRASS_NUM replace GRASS_GENERATION_RATE grass points
GRASS_GROWTH_CHANCE: 0.1  # changed: 0.5  # maybe will be useful to create droughts
MAX_LEAVES_NUM: 50
LEAVES_GENERATION_RATE: 0  # if exceeding MAX_LEAVES_NUM replace LEAVES_GENERATION_RATE grass points
LEAVES_GROWTH_CHANCE: 0.5  # maybe will be useful to create droughts

# Creatures parameters
NUM_CREATURES: 200  # init size of population
MAX_NUM_CREATURES: 500
INIT_MAX_AGE:  40000 # changed: 60000  # [sec] step_number * config.DT
ADOLESCENCE_AGE_FRACTION: 0.05  # [0-1] fraction of INIT_MAX_AGE for adulthood
REPRODUCTION_COOLDOWN: 300  # [sec] minimal time between reproduction events
INIT_MAX_MASS: 10  # [kg]
INIT_MAX_HEIGHT: 1  # [m]
INIT_MAX_STRENGTH: 5  # [N]
MAX_SPEED: 2.5  # [m/sec] maximum speed of the creature

# Eyes parameters
# Define eye parameters: (angle_offset in radians, aperture in radians)
# eyes_params: ((np.radians(30), np.radians(45)),(np.radians(-30), np.radians(45)))
EYE_CHANNEL: [ 'grass' , 'creature' ]  # ['grass', 'leaves', 'water', 'creature']
EYES_PARAMS: [
  [ 0, 90 ]
]  # list of lists - angle_offset (degrees), aperture (degrees)
VISION_LIMIT: 1000  # maximum distance that the creature can see
NOISE_STD: 0.5  # gaussian noise for vision - currently not in use

# Brain parameters
BRAIN_TYPE: 'graphic_brain'  # 'fully_connected_brain' or 'graphic_brain'
BRAIN_RANDOM_MAGNITUDE: 0.2
OUTPUT_SIZE: 2  # magnitude and direction
NORM_INPUT: [ 1, 1, 1 ]

# Mutations parameters
MUTATION_CHANCE: 0.3  # number between 0-1 indicating chance of trait to be mutated
STD_MUTATION_FACTORS: { 'color': 0.1,  # +-in each RGB color

                        'max_age': 2,
                        'max_mass': 1,
                        'max_height': 1,
                        'max_strength': 1,
                        'max_speed': 0.1,
                        'max_energy': 0,

                        'digest_dict': { 'grass': 0.1, 'leaf': 0.1, 'creature': 0.05 },
                        'reproduction_energy': 0,

                        'eyes_params': 5,  # +-degrees for each eye for angle and width
                        'vision_limit': 4, }

MUTATION_FC_BRAIN: { 'layer_addition': 0.1,
                     'modify_weights': 0.2,
                     'modify_layer': 0.2,
                     'modify_activation': 0.1 }

MUTATION_GRAPH_BRAIN: { 'add_node': 0.1,
                        'remove_node': 0.1,
                        'modify_edges': 0.7,  # chance to perform a change to the weights
                        'modify_edges_percentage': 0.5,  # percentage of edges to change
                        'add_edge': 0.3,
                        'remove_edge': 0.1,
                        'change_activation': 0.1,
                        'forget_magnitude': 10,
                        'add_loop': 0.2,
                        'break_edge': 0.5 }

# Energy/time parameters
DT: 2.5  # time passing between consecutive steps (relevant for age and movement)
INIT_MAX_ENERGY: 20000  # used now to indicate if creature is full (no more food). maybe useful for maturity test before reproduction
REPRODUCTION_ENERGY: 5000 # changed: 5000  # energy cost of reproduction
MIN_LIFE_ENERGY: 5000  # energy to be left after reproduction
GRASS_ENERGY: 2000
LEAF_ENERGY: 2000

# Food parameters
LEAF_HEIGHT: 10
FOOD_DISTANCE_THRESHOLD: 75
CHANCE_TO_HERBIVORE: 0.85

INIT_HERBIVORE_DIGEST_DICT: { 'grass': 1,
                              'leaf': 0,
                              'creature': 0 }

INIT_CARNIVORE_DIGEST_DICT: { 'grass': 0,
                              'leaf': 0,
                              'creature': 1 }

# Purge parameters
DO_PURGE: True
PURGE_FRAME_FREQUENCY: 50  # do purge every PURGE_FRAME_FREQUENCY frames
PURGE_PERCENTAGE: 0.1  # percentage out of MAX_NUM_CREATURES to do purge
PURGE_SPEED_THRESHOLD: 0.1  # if the creature's speed is below this threshold at first reproduction, it will be removed
PURGE_POP_PERCENTAGE: 0.75  # percentage of MAX_NUM_CREATURES to stuck simulation

# Movie parameters
FRAME_INTERVAL: 75  # interval between frames in animation [in ms]
FFMPEG_PATH: a_utils\ffmpeg-2025-02-20-git-bc1a3bfd2c-essentials_build\bin\ffmpeg.exe






